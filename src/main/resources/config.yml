# PlayerStatsBoard 配置文件
# ScriptIrc-config-version: 2

# 计分板设置
scoreboard:
  # 计分板标题
  title: "&6&l玩家统计"
  # 计分板更新间隔（秒）
  update-interval: 2
  # 是否自动为玩家显示计分板
  auto-show: true

# 统计项目设置
stats:
  # 死亡次数设置
  deaths:
    # 显示名称
    display-name: "&c死亡次数"
    # 死亡时增加的惩罚值
    punishment-on-death: 1
  
  # 技能使用次数设置
  skills:
    # 显示名称
    display-name: "&a技能使用"
    # 每次使用增加的技能次数
    increment-on-use: 1
    # 技能冷却时间（秒）
    cooldown: 5
  
  # 惩罚值设置
  punishment:
    # 显示名称
    display-name: "&4惩罚值"
    # 死亡时增加的惩罚值
    increment-on-death: 1
    # 最大惩罚值（0表示无限制）
    max-punishment: 100

# 消息设置
messages:
  # 计分板显示/隐藏消息
  scoreboard-show: "&a计分板已显示"
  scoreboard-hide: "&c计分板已隐藏"
  # 数据重置消息
  reset-success: "&a已重置玩家 %player% 的统计数据"
  reset-all-success: "&a已重置所有玩家的统计数据"
  # 错误消息
  no-permission: "&c你没有权限执行此命令"
  player-not-found: "&c找不到玩家 %player%"
  # 帮助消息
  help-header: "&6&lPlayerStatsBoard 命令帮助"
  help-show: "&e/scoreboard show &7- 显示计分板"
  help-hide: "&e/scoreboard hide &7- 隐藏计分板"
  help-reset: "&e/scoreboard reset [玩家] &7- 重置玩家数据"
  help-reload: "&e/scoreboard reload &7- 重载配置"
  # 技能消息
  skill-used: "&a你使用了技能%skill_id%"
  skill-cooldown: "&c技能冷却中，剩余%time%秒"
  skill-not-found: "&c这不是有效的技能物品"

# 技能系统设置
skills:
  # 是否启用技能系统
  enabled: true
  # 技能列表
  list:
    # 技能1
    skill1:
      # 技能物品
      item: "BOOK"
      # 技能名称（显示用）
      name: "技能1"
      # 冷却时间（秒，0表示无冷却）
      cooldown: 5
      # 技能效果（预留接口）
      effect: "none"
    
